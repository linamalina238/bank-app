<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bank App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* --- Скидання --- */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    /* --- CSS-змінні (кольори, радіуси) --- */
    :root{
      --orange:#d36922;
      --dark:#201e1e;--dark2:#2a2726;--dark3:#332f2d;--dark4:#3d3a37;
      --white:#fff;--muted:#9a9090;
      --radius:16px;--radius-sm:11px;
    }

    /* --- Базові стилі body --- */
    html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--dark);overflow:hidden}
    body{display:flex;align-items:center;justify-content:center}

    /* --- Фрейм телефону 390×844 --- */
    #app-frame{
      position:relative;width:390px;height:844px;
      flex-shrink:0;overflow:hidden;background:var(--dark);
      transform-origin:top center;
    }

    /* --- Екрани (перемикаються класом .active) --- */
    .screen{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;
      transition:opacity .35s ease;overflow:hidden;
    }
    .screen.active{opacity:1;pointer-events:all}

    /* ===================== WELCOME ===================== */
    #screen-welcome{
      flex-direction:column;align-items:center;justify-content:flex-end;
      padding:0 0 36px;
      background:radial-gradient(ellipse at 50% 20%,rgba(211,105,34,.18) 0%,transparent 65%),var(--dark);
    }

    /* Фонова сітка-схема */
    .circuit-bg{position:absolute;inset:0;opacity:.06;pointer-events:none}

    /* Область ілюстрації банку (верхні 52%) */
    .welcome-illustration{
      position:absolute;top:0;left:0;right:0;height:52%;
      display:flex;align-items:center;justify-content:center;overflow:hidden;
    }
    .bank-scene{width:320px;height:300px;position:relative}
    .scene-glow{
      position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);
      width:260px;height:40px;
      background:radial-gradient(ellipse,rgba(211,105,34,.5) 0%,transparent 70%);
      filter:blur(12px);
    }

    /* Блок з текстом і кнопками */
    .welcome-bottom{
      position:relative;z-index:2;
      width:100%;max-width:380px;
      margin:8px auto 0;padding:0 28px;
      display:flex;flex-direction:column;align-items:center;
    }

    /* Заголовок "твій банк HUB" */
    .welcome-title{
      font-family:'Syne',sans-serif;font-size:38px;font-weight:800;
      line-height:1.15;color:var(--white);
      text-align:center;margin-bottom:10px;width:100%;
    }
    .welcome-title .neon{
      color:#ff7b2c;
      text-shadow:0 0 4px #d36922,0 0 10px rgba(211,105,34,.6),0 0 22px rgba(211,105,34,.25);
      animation:neon-pulse 2.4s ease-in-out infinite;
    }
    @keyframes neon-pulse{
      0%,100%{text-shadow:0 0 4px #d36922,0 0 10px rgba(211,105,34,.6),0 0 22px rgba(211,105,34,.25)}
      50%{text-shadow:0 0 6px #e8843a,0 0 16px rgba(232,132,58,.5),0 0 35px rgba(211,105,34,.2)}
    }

    /* Підзаголовок */
    .welcome-sub{font-size:14px;color:var(--muted);line-height:1.6;text-align:center;margin-bottom:16px}

    /* Кнопки "Створити акаунт" і "Увійти" */
    .welcome-actions{width:100%;display:flex;flex-direction:column;gap:12px}
    .btn-welcome{
      width:100%;background:rgba(255,255,255,.04);color:var(--white);
      border:1.5px solid rgba(211,105,34,.55);border-radius:50px;padding:16px;
      font-family:'Syne',sans-serif;font-size:16px;font-weight:700;
      cursor:pointer;letter-spacing:.01em;
      transition:background .2s,border-color .2s,box-shadow .2s;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 18px rgba(211,105,34,.12);backdrop-filter:blur(4px);
    }
    .btn-welcome:hover{background:rgba(211,105,34,.12);border-color:var(--orange);box-shadow:0 0 28px rgba(211,105,34,.3)}
    .btn-welcome:active{transform:scale(.98)}

    /* Підпис "Вже є акаунт? Увійти" */
    .welcome-signin{font-size:13px;color:var(--muted);margin-top:4px;text-align:center}

    /* ===================== AUTH (логін / реєстрація) ===================== */
    #screen-login,#screen-register{
      background:var(--dark);flex-direction:column;padding:0;overflow:hidden
    }

    /* Верхня частина з ілюстрацією та лого */
    .auth-top{
      width:100%;height:200px;flex-shrink:0;position:relative;overflow:hidden;
      display:flex;align-items:flex-end;justify-content:center;padding-bottom:18px;
    }
    .auth-top-bg{
      position:absolute;inset:0;
      background:radial-gradient(ellipse at 50% 0%,rgba(211,105,34,.3) 0%,transparent 70%),var(--dark2);
    }
    .auth-top-lines{position:absolute;inset:0;opacity:.1}

    /* Кнопка "Назад" (ліво зверху) */
    .back-btn{
      position:absolute;top:20px;left:20px;z-index:3;
      background:rgba(255,255,255,.08);border:none;color:var(--white);
      font-family:'DM Sans',sans-serif;font-size:14px;
      padding:8px 16px;border-radius:50px;cursor:pointer;
      display:flex;align-items:center;gap:6px;
      backdrop-filter:blur(8px);transition:background .2s;
    }
    .back-btn:hover{background:rgba(255,255,255,.14)}

    /* Хрестик "Закрити" (право зверху картки) */
    .close-btn{
      position:absolute;top:16px;right:16px;z-index:10;
      width:34px;height:34px;border-radius:50%;
      background:rgba(255,255,255,.08);border:none;color:var(--white);
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      backdrop-filter:blur(8px);transition:background .2s;flex-shrink:0;
    }
    .close-btn:hover{background:rgba(211,105,34,.25)}

    /* Лого "BankApp" (право зверху шапки) */
    .auth-logo{position:absolute;top:18px;right:20px;z-index:3;display:flex;align-items:center;gap:8px}
    .auth-logo-icon{width:36px;height:36px;background:var(--dark);border-radius:10px;display:flex;align-items:center;justify-content:center}
    .auth-logo-text{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--white)}

    /* Міні-ілюстрація банку у шапці */
    .auth-mini-bank{position:relative;z-index:2}

    /* Темна картка форми */
    .auth-card{
      flex:1;width:100%;background:#272323;
      border-radius:28px 28px 0 0;padding:24px 26px 28px;overflow:hidden;
    }
    .auth-card h2{font-family:'Syne',sans-serif;font-size:25px;font-weight:800;color:var(--white);margin-bottom:16px}

    /* Поля форми */
    .field{margin-bottom:10px}
    .field label{display:block;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:#6a6464;margin-bottom:6px}
    .field .input-wrap{position:relative}
    .field input{
      width:100%;background:#1e1c1c;border:1.5px solid #3a3636;
      border-radius:var(--radius-sm);padding:14px 16px;
      font-family:'DM Sans',sans-serif;font-size:15px;color:var(--white);
      outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none
    }
    .field input::placeholder{color:#5a5555}
    .field input:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(211,105,34,.1)}

    /* Кнопка показу пароля */
    .eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);display:flex;padding:0}

    /* Блок помилки */
    .error-msg{
      background:rgba(211,105,34,.08);border:1px solid rgba(211,105,34,.2);
      border-radius:var(--radius-sm);padding:11px 14px;
      font-size:13px;color:var(--orange);margin-bottom:14px;display:none;
    }
    .error-msg.visible{display:block}

    /* Кнопка відправки форми */
    .btn-submit{
      width:100%;background:linear-gradient(135deg,var(--orange) 0%,#8a3a0a 100%);
      color:#fff;border:none;border-radius:50px;padding:16px;
      font-family:'Syne',sans-serif;font-size:16px;font-weight:700;
      cursor:pointer;margin-top:6px;
      transition:opacity .2s,transform .15s;
      display:flex;align-items:center;justify-content:center;gap:8px;
      box-shadow:0 8px 24px rgba(211,105,34,.35);
    }
    .btn-submit:hover{opacity:.9}
    .btn-submit:active{transform:scale(.98)}

    /* Спінер завантаження на кнопці */
    .spinner{
      width:18px;height:18px;border:2px solid rgba(255,255,255,.3);
      border-top-color:#fff;border-radius:50%;
      animation:spin .6s linear infinite;display:none;
    }
    .btn-submit.loading .spinner{display:block}
    .btn-submit.loading .btn-label{display:none}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ===================== SUCCESS ===================== */
    #screen-success{background:var(--dark);flex-direction:column;text-align:center;padding:40px 32px}
    .success-icon-wrap{
      width:90px;height:90px;background:rgba(211,105,34,.15);border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 28px;border:2px solid rgba(211,105,34,.3);
    }
    #screen-success h2{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--white);margin-bottom:10px}
    #screen-success p{font-size:15px;color:var(--muted)}

    /* ===================== TOAST (повідомлення) ===================== */
    .toast{
      position:absolute;bottom:32px;left:50%;
      transform:translateX(-50%) translateY(20px);
      background:var(--dark3);border:1px solid var(--dark4);color:var(--white);
      border-radius:50px;padding:12px 20px;
      display:flex;align-items:center;gap:10px;
      font-size:14px;font-weight:500;
      opacity:0;pointer-events:none;
      transition:opacity .3s ease,transform .3s ease;
      z-index:9999;white-space:nowrap;
      box-shadow:0 8px 32px rgba(0,0,0,.4);
      min-width:200px;justify-content:center;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all}
    .toast.error{border-color:rgba(211,105,34,.5);background:#2a1f1a}
    .toast.success{border-color:rgba(80,200,100,.4);background:#1a2a1e}
    .toast-icon{
      width:22px;height:22px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:700;flex-shrink:0;
    }
    .toast.error .toast-icon{background:rgba(211,105,34,.2);color:var(--orange)}
    .toast.success .toast-icon{background:rgba(80,200,100,.2);color:#50c864}
  </style>
</head>
<body>

<!-- ===================== ФРЕЙМ ТЕЛЕФОНУ ===================== -->
<div id="app-frame">

  <!-- ===================== WELCOME ===================== -->
  <div class="screen active" id="screen-welcome">

    <!-- Фонова сітка -->
    <svg class="circuit-bg" viewBox="0 0 400 700" preserveAspectRatio="xMidYMid slice">
      <g stroke="#d36922" stroke-width="1" fill="none">
        <line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="240" x2="400" y2="240"/>
        <line x1="60" y1="0" x2="60" y2="700"/><line x1="180" y1="0" x2="180" y2="700"/><line x1="320" y1="0" x2="320" y2="700"/>
        <circle cx="60" cy="120" r="4" fill="#d36922"/><circle cx="180" cy="120" r="4" fill="#d36922"/>
        <circle cx="320" cy="240" r="4" fill="#d36922"/><circle cx="60" cy="240" r="4" fill="#d36922"/>
        <rect x="140" y="100" width="20" height="20" rx="3"/><rect x="290" y="220" width="20" height="20" rx="3"/>
        <path d="M60 120 L60 80 L100 80"/><path d="M180 120 L220 120 L220 80 L270 80"/>
        <path d="M320 240 L360 240 L360 200"/><path d="M60 240 L20 240 L20 280"/>
      </g>
    </svg>

    <!-- Ілюстрація банку -->
    <div class="welcome-illustration">
      <div class="bank-scene">
        <div class="scene-glow"></div>
        <svg viewBox="0 0 320 300" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
          <defs>
            <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <ellipse cx="160" cy="262" rx="130" ry="18" fill="rgba(211,105,34,0.15)"/>
          <path d="M40 248 L80 262 L240 262 L280 248 L260 240 L60 240 Z" fill="#2a2726"/>
          <path d="M40 248 L60 240 L260 240 L280 248 Z" fill="#3d3a37"/>
          <rect x="75" y="155" width="170" height="85" rx="4" fill="#2e2b28" stroke="#d36922" stroke-width="1" stroke-opacity=".5"/>
          <rect x="92"  y="145" width="14" height="95" rx="3" fill="#332f2d" stroke="#d36922" stroke-width=".8" stroke-opacity=".6"/>
          <rect x="116" y="145" width="14" height="95" rx="3" fill="#332f2d" stroke="#d36922" stroke-width=".8" stroke-opacity=".6"/>
          <rect x="140" y="145" width="14" height="95" rx="3" fill="#332f2d" stroke="#d36922" stroke-width=".8" stroke-opacity=".6"/>
          <rect x="164" y="145" width="14" height="95" rx="3" fill="#332f2d" stroke="#d36922" stroke-width=".8" stroke-opacity=".6"/>
          <rect x="188" y="145" width="14" height="95" rx="3" fill="#332f2d" stroke="#d36922" stroke-width=".8" stroke-opacity=".6"/>
          <rect x="212" y="145" width="14" height="95" rx="3" fill="#332f2d" stroke="#d36922" stroke-width=".8" stroke-opacity=".6"/>
          <rect x="68" y="138" width="184" height="12" rx="3" fill="#3d3a37" stroke="#d36922" stroke-width=".8" stroke-opacity=".7"/>
          <path d="M62 138 L160 90 L258 138 Z" fill="#2e2b28" stroke="#d36922" stroke-width="1.2" stroke-opacity=".8"/>
          <path d="M80 138 L160 97 L240 138 Z" fill="#3d3a37"/>
          <circle cx="160" cy="116" r="12" fill="#d36922" opacity=".9" filter="url(#glow)"/>
          <text x="160" y="121" text-anchor="middle" fill="#201e1e" font-size="13" font-weight="bold" font-family="Syne">$</text>
          <text x="52"  y="190" fill="#d36922" font-size="16" font-weight="bold" font-family="Syne" opacity=".5" filter="url(#glow)">$</text>
          <text x="270" y="165" fill="#d36922" font-size="12" font-weight="bold" font-family="Syne" opacity=".4">$</text>
          <path d="M40 200 L60 200 L60 220 L75 220" stroke="#d36922" stroke-width=".8" stroke-opacity=".4"/>
          <path d="M280 180 L265 180 L265 155" stroke="#d36922" stroke-width=".8" stroke-opacity=".4"/>
          <circle cx="60"  cy="220" r="2.5" fill="#d36922" opacity=".5"/>
          <circle cx="265" cy="155" r="2.5" fill="#d36922" opacity=".5"/>
        </svg>
      </div>
    </div>

    <!-- Текст і кнопки -->
    <div class="welcome-bottom">
      <div class="welcome-title">
        твій банк<br/><span class="neon">HUB</span>
      </div>
      <p class="welcome-sub">Керуй балансом, переказами<br/>та витратами — все в одному місці.</p>
      <div class="welcome-actions">
        <button class="btn-welcome" onclick="goto('screen-register')">Створити акаунт</button>
        <button class="btn-welcome" onclick="goto('screen-login')">Увійти</button>
      </div>
      <p class="welcome-signin">Вже є акаунт? <button onclick="goto('screen-login')" style="background:none;border:none;color:var(--orange);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;text-decoration:underline;padding:0">Увійти</button></p>
    </div>
  </div>

  <!-- ===================== ЛОГІН ===================== -->
  <div class="screen" id="screen-login">
    <!-- Шапка з банком і лого -->
    <div class="auth-top">
      <div class="auth-top-bg"></div>
      <svg class="auth-top-lines" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice">
        <g stroke="#d36922" stroke-width="1" fill="none">
          <path d="M-50 40 Q100 10 200 55 Q310 100 450 35"/>
          <path d="M-50 70 Q100 40 200 85 Q310 130 450 65"/>
          <path d="M-50 100 Q100 70 200 115 Q310 160 450 95"/>
          <path d="M-50 130 Q100 100 200 145 Q310 190 450 125"/>
        </g>
      </svg>
      <button class="back-btn" onclick="goto('screen-welcome')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Назад
      </button>
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="22" height="18" viewBox="0 0 44 36" fill="none">
            <rect x="0" y="8" width="36" height="26" rx="4" fill="#d36922"/>
            <rect x="4" y="14" width="28" height="4" rx="1" fill="#201e1e" opacity=".7"/>
            <rect x="4" y="20" width="20" height="3" rx="1" fill="#201e1e" opacity=".5"/>
            <circle cx="8"  cy="30" r="4" fill="#201e1e" opacity=".6"/>
            <circle cx="13" cy="30" r="4" fill="#201e1e" opacity=".5"/>
            <rect x="20" y="0" width="22" height="14" rx="3" fill="#d36922" transform="rotate(10 20 0)"/>
          </svg>
        </div>
        <span class="auth-logo-text">BankApp</span>
      </div>
      <div class="auth-mini-bank">
        <svg width="100" height="80" viewBox="0 0 320 240" fill="none">
          <rect x="75" y="120" width="170" height="80" rx="4" fill="#2e2b28" stroke="#d36922" stroke-width="1" stroke-opacity=".4"/>
          <rect x="92"  y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="116" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="140" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="164" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="188" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="212" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="68" y="106" width="184" height="10" rx="2" fill="#3d3a37" stroke="#d36922" stroke-width=".6" stroke-opacity=".6"/>
          <path d="M62 106 L160 65 L258 106 Z" fill="#2e2b28" stroke="#d36922" stroke-width="1" stroke-opacity=".7"/>
          <circle cx="160" cy="86" r="9" fill="#d36922" opacity=".9"/>
          <text x="160" y="90" text-anchor="middle" fill="#201e1e" font-size="10" font-weight="bold" font-family="Syne">$</text>
        </svg>
      </div>
    </div>

    <!-- Форма входу -->
    <div class="auth-card" style="position:relative">
      <button class="close-btn" onclick="goto('screen-welcome')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <h2>З поверненням</h2>
      <div class="error-msg" id="login-error"></div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="vhidEmail" placeholder="your@email.com"/>
      </div>
      <div class="field">
        <label>Пароль</label>
        <div class="input-wrap">
          <input type="password" id="vhidParol" placeholder="Введіть пароль"/>
          <button class="eye-btn" onclick="toggleEye('vhidParol',this)" tabindex="-1">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button class="btn-submit" id="btn-login" onclick="handleLogin()">
        <span class="btn-label">Увійти</span>
        <div class="spinner"></div>
      </button>
    </div>
  </div>

  <!-- ===================== РЕЄСТРАЦІЯ ===================== -->
  <div class="screen" id="screen-register">
    <!-- Шапка з банком і лого (ідентична логіну) -->
    <div class="auth-top">
      <div class="auth-top-bg"></div>
      <svg class="auth-top-lines" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice">
        <g stroke="#d36922" stroke-width="1" fill="none">
          <path d="M-50 40 Q100 10 200 55 Q310 100 450 35"/>
          <path d="M-50 70 Q100 40 200 85 Q310 130 450 65"/>
          <path d="M-50 100 Q100 70 200 115 Q310 160 450 95"/>
          <path d="M-50 130 Q100 100 200 145 Q310 190 450 125"/>
        </g>
      </svg>
      <button class="back-btn" onclick="goto('screen-welcome')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Назад
      </button>
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="22" height="18" viewBox="0 0 44 36" fill="none">
            <rect x="0" y="8" width="36" height="26" rx="4" fill="#d36922"/>
            <rect x="4" y="14" width="28" height="4" rx="1" fill="#201e1e" opacity=".7"/>

<!-- Глобальні функції (доступні до завантаження модуля) -->
<script>
  window.goto = function(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  };
  window.toggleEye = function(inputId, btn) {
    const input = document.getElementById(inputId);
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.querySelector('svg').innerHTML = show
      ? '<path d="M17.94 17.94A10 10 0 0112 20c-7 0-11-8-11-8a18 18 0 015.06-5.94M9.9 4.24A9 9 0 0112 4c7 0 11 8 11 8a18 18 0 01-2.16 3.19M1 1l22 22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/>';
  };
  window.handleLogin    = async function() { if (window._handleLogin)    await window._handleLogin(); };
  window.handleRegister = async function() { if (window._handleRegister) await window._handleRegister(); };
  window.handleLogout   = function()       { if (window._handleLogout)   window._handleLogout(); };
</script>

<!-- Модуль: підключає auth.js, реєструє обробники логіну/реєстрації -->
<script type="module">
  import { handleLogin, handleRegister, logout } from './src/auth.js';

  const setLoading = (id, on) => document.getElementById(id)?.classList.toggle('loading', on);

  function showToast(text, type) {
    const toast     = document.getElementById('povidomlennya');
    const toastText = document.getElementById('toastTekst');
    const toastIcon = document.getElementById('toastIkona');
    if (!toast) return;
    toastText.textContent = text;
    toastIcon.textContent = type === 'error' ? '✕' : '✓';
    toast.className = `toast show ${type}`;
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // auth.js очікує параметри (email, password) — читаємо з DOM тут
  window._handleLogin = async () => {
    setLoading('btn-login', true);
    const email    = document.getElementById('vhidEmail')?.value?.trim();
    const password = document.getElementById('vhidParol')?.value;
    const result   = await handleLogin(email, password);
    setLoading('btn-login', false);
    if (result.success) {
      showToast('Вхід успішний!', 'success');
      setTimeout(() => { window.location.href = 'account.html'; }, 600);
    } else {
      showToast(result.message || 'Невірна пошта або пароль', 'error');
    }
  };

  window._handleRegister = async () => {
    setLoading('btn-register', true);
    const name     = document.getElementById('regImya')?.value?.trim();
    const email    = document.getElementById('regEmail')?.value?.trim();
    const phone    = document.getElementById('regPhone')?.value?.trim();
    const password = document.getElementById('regParol')?.value;
    const result   = await handleRegister(name, email, password, phone);
    setLoading('btn-register', false);
    if (result.success) {
      showToast('Акаунт створено!', 'success');
      setTimeout(() => { window.location.href = 'account.html'; }, 600);
    } else {
      showToast(result.message || 'Помилка реєстрації', 'error');
    }
  };

  window._handleLogout = () => {
    logout();
    window.location.href = 'index.html';
  };

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('screen-login').classList.contains('active'))
      window.handleLogin();
    else if (document.getElementById('screen-register').classList.contains('active'))
      window.handleRegister();
  });
</script>

<!-- Масштабування фрейму під розмір вікна (ніколи не збільшує) -->
<script>
  function scaleFrame() {
    const frame = document.getElementById('app-frame');
    const scale = Math.min(window.innerWidth/390, window.innerHeight/844, 1);
    frame.style.transform = `scale(${scale})`;
    const offsetY = (window.innerHeight - 844*scale) / 2;
    frame.style.marginTop = offsetY > 0 ? offsetY+'px' : '0';
  }
  scaleFrame();
  window.addEventListener('resize', scaleFrame);
</script>
