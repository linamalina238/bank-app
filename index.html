<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bank App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css"/>
</head>
<body>

<div id="app-frame">

  <!-- WELCOME -->
  <div class="screen active" id="screen-welcome">
    <svg class="circuit-bg" viewBox="0 0 400 700" preserveAspectRatio="xMidYMid slice">
      <g stroke="#d36922" stroke-width="1" fill="none">
        <line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="240" x2="400" y2="240"/>
        <line x1="60" y1="0" x2="60" y2="700"/><line x1="180" y1="0" x2="180" y2="700"/><line x1="320" y1="0" x2="320" y2="700"/>
        <circle cx="60" cy="120" r="4" fill="#d36922"/><circle cx="180" cy="120" r="4" fill="#d36922"/>
        <circle cx="320" cy="240" r="4" fill="#d36922"/><circle cx="60" cy="240" r="4" fill="#d36922"/>
        <rect x="140" y="100" width="20" height="20" rx="3"/><rect x="290" y="220" width="20" height="20" rx="3"/>
        <path d="M60 120 L60 80 L100 80"/><path d="M180 120 L220 120 L220 80 L270 80"/>
        <path d="M320 240 L360 240 L360 200"/><path d="M60 240 L20 240 L20 280"/>
      </g>
    </svg>
    <div class="welcome-illustration">
      <div class="bank-scene">
        <div class="scene-glow"></div>
        <svg viewBox="0 0 320 300" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
          <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
          <ellipse cx="160" cy="262" rx="130" ry="18" fill="rgba(211,105,34,0.15)"/>
          <path d="M40 248 L80 262 L240 262 L280 248 L260 240 L60 240 Z" fill="#2a2726"/>
          <path d="M40 248 L60 240 L260 240 L280 248 Z" fill="#3d3a37"/>
          <rect x="75" y="155" width="170" height="85" rx="4" fill="#2e2b28" stroke="#d36922" stroke-width="1" stroke-opacity=".5"/>
          <rect x="92" y="145" width="14" height="95" rx="3" fill="#332f2d" stroke="#d36922" stroke-width=".8" stroke-opacity=".6"/>
          <rect x="116" y="145" width="14" height="95" rx="3" fill="#332f2d" stroke="#d36922" stroke-width=".8" stroke-opacity=".6"/>
          <rect x="140" y="145" width="14" height="95" rx="3" fill="#332f2d" stroke="#d36922" stroke-width=".8" stroke-opacity=".6"/>
          <rect x="164" y="145" width="14" height="95" rx="3" fill="#332f2d" stroke="#d36922" stroke-width=".8" stroke-opacity=".6"/>
          <rect x="188" y="145" width="14" height="95" rx="3" fill="#332f2d" stroke="#d36922" stroke-width=".8" stroke-opacity=".6"/>
          <rect x="212" y="145" width="14" height="95" rx="3" fill="#332f2d" stroke="#d36922" stroke-width=".8" stroke-opacity=".6"/>
          <rect x="68" y="138" width="184" height="12" rx="3" fill="#3d3a37" stroke="#d36922" stroke-width=".8" stroke-opacity=".7"/>
          <path d="M62 138 L160 90 L258 138 Z" fill="#2e2b28" stroke="#d36922" stroke-width="1.2" stroke-opacity=".8"/>
          <path d="M80 138 L160 97 L240 138 Z" fill="#3d3a37"/>
          <circle cx="160" cy="116" r="12" fill="#d36922" opacity=".9" filter="url(#glow)"/>
          <text x="160" y="121" text-anchor="middle" fill="#201e1e" font-size="13" font-weight="bold" font-family="Syne">$</text>
          <text x="52" y="190" fill="#d36922" font-size="16" font-weight="bold" font-family="Syne" opacity=".5" filter="url(#glow)">$</text>
          <text x="270" y="165" fill="#d36922" font-size="12" font-weight="bold" font-family="Syne" opacity=".4">$</text>
          <path d="M40 200 L60 200 L60 220 L75 220" stroke="#d36922" stroke-width=".8" stroke-opacity=".4"/>
          <path d="M280 180 L265 180 L265 155" stroke="#d36922" stroke-width=".8" stroke-opacity=".4"/>
          <circle cx="60" cy="220" r="2.5" fill="#d36922" opacity=".5"/>
          <circle cx="265" cy="155" r="2.5" fill="#d36922" opacity=".5"/>
        </svg>
      </div>
    </div>
    <div class="welcome-bottom">
      <div class="welcome-title">твій банк<br/><span class="neon">HUB</span></div>
      <p class="welcome-sub">Керуй балансом, переказами<br/>та витратами — все в одному місці.</p>
      <div class="welcome-actions">
        <button class="btn-welcome" onclick="goto('screen-register')">Створити акаунт</button>
        <button class="btn-welcome" onclick="goto('screen-login')">Увійти</button>
      </div>
      <p class="welcome-signin">Вже є акаунт? <button onclick="goto('screen-login')" style="background:none;border:none;color:var(--orange);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;text-decoration:underline;padding:0">Увійти</button></p>
    </div>
  </div>

  <!-- ЛОГІН -->
  <div class="screen" id="screen-login">
    <div class="auth-top">
      <div class="auth-top-bg"></div>
      <svg class="auth-top-lines" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice">
        <g stroke="#d36922" stroke-width="1" fill="none">
          <path d="M-50 40 Q100 10 200 55 Q310 100 450 35"/>
          <path d="M-50 70 Q100 40 200 85 Q310 130 450 65"/>
          <path d="M-50 100 Q100 70 200 115 Q310 160 450 95"/>
          <path d="M-50 130 Q100 100 200 145 Q310 190 450 125"/>
        </g>
      </svg>
      <button class="back-btn" onclick="goto('screen-welcome')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Назад
      </button>
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="22" height="18" viewBox="0 0 44 36" fill="none">
            <rect x="0" y="8" width="36" height="26" rx="4" fill="#d36922"/>
            <rect x="4" y="14" width="28" height="4" rx="1" fill="#201e1e" opacity=".7"/>
            <rect x="4" y="20" width="20" height="3" rx="1" fill="#201e1e" opacity=".5"/>
            <circle cx="8" cy="30" r="4" fill="#201e1e" opacity=".6"/>
            <circle cx="13" cy="30" r="4" fill="#201e1e" opacity=".5"/>
            <rect x="20" y="0" width="22" height="14" rx="3" fill="#d36922" transform="rotate(10 20 0)"/>
          </svg>
        </div>
        <span class="auth-logo-text">BankApp</span>
      </div>
      <div class="auth-mini-bank">
        <svg width="100" height="80" viewBox="0 0 320 240" fill="none">
          <rect x="75" y="120" width="170" height="80" rx="4" fill="#2e2b28" stroke="#d36922" stroke-width="1" stroke-opacity=".4"/>
          <rect x="92" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="116" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="140" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="164" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="188" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="212" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="68" y="106" width="184" height="10" rx="2" fill="#3d3a37" stroke="#d36922" stroke-width=".6" stroke-opacity=".6"/>
          <path d="M62 106 L160 65 L258 106 Z" fill="#2e2b28" stroke="#d36922" stroke-width="1" stroke-opacity=".7"/>
          <circle cx="160" cy="86" r="9" fill="#d36922" opacity=".9"/>
          <text x="160" y="90" text-anchor="middle" fill="#201e1e" font-size="10" font-weight="bold" font-family="Syne">$</text>
        </svg>
      </div>
    </div>
    <div class="auth-card" style="position:relative">
      <button class="close-btn" onclick="goto('screen-welcome')" type="button">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <h2>З поверненням</h2>
      <form id="login-form">
        <p class="error-msg" id="login-error"></p>
        <div class="field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="your@email.com"/>
        </div>
        <div class="field">
          <label>Пароль</label>
          <div class="input-wrap">
            <input type="password" id="login-password" placeholder="Введіть пароль"/>
            <button class="eye-btn" onclick="toggleEye('login-password',this)" tabindex="-1" type="button">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button class="btn-submit" type="submit">
          <span class="btn-label">Увійти</span>
          <div class="spinner"></div>
        </button>
      </form>
    </div>
  </div>

  <!-- РЕЄСТРАЦІЯ -->
  <div class="screen" id="screen-register">
    <div class="auth-top">
      <div class="auth-top-bg"></div>
      <svg class="auth-top-lines" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice">
        <g stroke="#d36922" stroke-width="1" fill="none">
          <path d="M-50 40 Q100 10 200 55 Q310 100 450 35"/>
          <path d="M-50 70 Q100 40 200 85 Q310 130 450 65"/>
          <path d="M-50 100 Q100 70 200 115 Q310 160 450 95"/>
          <path d="M-50 130 Q100 100 200 145 Q310 190 450 125"/>
        </g>
      </svg>
      <button class="back-btn" onclick="goto('screen-welcome')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Назад
      </button>
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="22" height="18" viewBox="0 0 44 36" fill="none">
            <rect x="0" y="8" width="36" height="26" rx="4" fill="#d36922"/>
            <rect x="4" y="14" width="28" height="4" rx="1" fill="#201e1e" opacity=".7"/>
            <rect x="4" y="20" width="20" height="3" rx="1" fill="#201e1e" opacity=".5"/>
            <circle cx="8" cy="30" r="4" fill="#201e1e" opacity=".6"/>
            <circle cx="13" cy="30" r="4" fill="#201e1e" opacity=".5"/>
            <rect x="20" y="0" width="22" height="14" rx="3" fill="#d36922" transform="rotate(10 20 0)"/>
          </svg>
        </div>
        <span class="auth-logo-text">BankApp</span>
      </div>
      <div class="auth-mini-bank">
        <svg width="100" height="80" viewBox="0 0 320 240" fill="none">
          <rect x="75" y="120" width="170" height="80" rx="4" fill="#2e2b28" stroke="#d36922" stroke-width="1" stroke-opacity=".4"/>
          <rect x="92" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="116" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="140" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="164" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="188" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="212" y="112" width="12" height="88" rx="2" fill="#332f2d" stroke="#d36922" stroke-width=".6" stroke-opacity=".5"/>
          <rect x="68" y="106" width="184" height="10" rx="2" fill="#3d3a37" stroke="#d36922" stroke-width=".6" stroke-opacity=".6"/>
          <path d="M62 106 L160 65 L258 106 Z" fill="#2e2b28" stroke="#d36922" stroke-width="1" stroke-opacity=".7"/>
          <circle cx="160" cy="86" r="9" fill="#d36922" opacity=".9"/>
          <text x="160" y="90" text-anchor="middle" fill="#201e1e" font-size="10" font-weight="bold" font-family="Syne">$</text>
        </svg>
      </div>
    </div>
    <div class="auth-card" style="position:relative">
      <button class="close-btn" onclick="goto('screen-welcome')" type="button">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <h2>Створити акаунт</h2>
      <form id="register-form">
        <p class="error-msg" id="register-error"></p>
        <div class="field">
          <label>Ім'я</label>
          <input type="text" id="register-name" placeholder="Твоє ім'я"/>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="register-email" placeholder="your@email.com"/>
        </div>
        <div class="field">
          <label>Телефон</label>
          <input type="tel" id="register-phone" placeholder="+380..."/>
        </div>
        <div class="field">
          <label>Пароль</label>
          <div class="input-wrap">
            <input type="password" id="register-password" placeholder="Мінімум 4 символи"/>
            <button class="eye-btn" onclick="toggleEye('register-password',this)" tabindex="-1" type="button">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button class="btn-submit" type="submit">
          <span class="btn-label">Почати</span>
          <div class="spinner"></div>
        </button>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="povidomlennya">
    <span class="toast-icon" id="toastIkona"></span>
    <span id="toastTekst"></span>
  </div>

</div>

<script>
  window.goto = function(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  };
  window.toggleEye = function(inputId, btn) {
    const input = document.getElementById(inputId);
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.querySelector('svg').innerHTML = show
      ? '<path d="M17.94 17.94A10 10 0 0112 20c-7 0-11-8-11-8a18 18 0 015.06-5.94M9.9 4.24A9 9 0 0112 4c7 0 11 8 11 8a18 18 0 01-2.16 3.19M1 1l22 22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/>';
  };
</script>

<script type="module">
  import { initForms } from './src/ui.js';
  import { getCurrentUser } from './src/storage.js';

  // Якщо вже залогінений — одразу на дашборд
  if (getCurrentUser()) window.location.href = 'account.html';

  // Ініціалізуємо форми
  initForms();

  // Після сабміту — перевіряємо чи з'явився юзер і перекидаємо
  ['login-form', 'register-form'].forEach(id => {
    document.getElementById(id)?.addEventListener('submit', () => {
      setTimeout(() => {
        if (getCurrentUser()) window.location.href = 'account.html';
      }, 600);
    });
  });
</script>

<script>
  function scaleFrame() {
    const frame = document.getElementById('app-frame');
    const scale = Math.min(window.innerWidth/390, window.innerHeight/844, 1);
    frame.style.transform = `scale(${scale})`;
    const offsetY = (window.innerHeight - 844*scale) / 2;
    frame.style.marginTop = offsetY > 0 ? offsetY+'px' : '0';
  }
  scaleFrame();
  window.addEventListener('resize', scaleFrame);
</script>

</body>
</html>
